<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Škola hrou | Edu-Box CZ</title>
    <!-- Knihovny pro vzhled a ikony -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React a Babel (umožní spustit React kód přímo v HTML) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Pomocná komponenta pro ikony z knihovny Lucide
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) { window.lucide.createIcons(); }
            }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
            const [view, setView] = useState('home');

            // --- DATA PRO PORTÁL ---
            const lessons4 = [
                { id: "PL01", name: "01 Stroj času a osa dějin", month: "Září", icon: "history", desc: "Úvod do chronologie a barvy historických epoch.", file: "metodika_4_01.pdf" },
                { id: "PL02", name: "02 Lovci mamutů", month: "Říjen", icon: "tent", desc: "První obydlí z kostí a kůží. Statika kužele.", file: "metodika_4_02.pdf" },
                { id: "PL03", name: "03 Keltské oppidum", month: "Listopad", icon: "shield-alert", desc: "Klešťovitá brána a hradební valy.", file: "metodika_4_03.pdf" },
                { id: "PL04", name: "04 Příchod Slovanů", month: "Prosinec", icon: "layers", desc: "Hora Říp, rotunda a první zemnice v údolí.", file: "metodika_4_04.pdf" },
                { id: "PL05", name: "05 Velká Morava", month: "Leden", icon: "landmark", desc: "Zděné baziliky a umění šperku (Gombíky).", file: "metodika_4_05.pdf" },
                { id: "PL06", name: "06 Raní Přemyslovci", month: "Únor", icon: "tower-control", desc: "Románský sloh, masivní zdi a obytné věže.", file: "metodika_4_06.pdf" },
                { id: "PL07", name: "07 Středověké město", month: "Březen", icon: "layout-grid", desc: "Urbanismus, právo trhu a domy s podloubím.", file: "metodika_4_07.pdf" },
                { id: "PL08", name: "08 Gotika a Karel IV.", month: "Duben", icon: "zap", desc: "Lomený oblouk, katedrály a Karlův most.", file: "metodika_4_08.pdf" },
                { id: "PL09", name: "09 Chalupa Markétka", month: "Květen", icon: "home", desc: "Lidová architektura, roubení a modularita.", file: "metodika_4_09.pdf" },
                { id: "PL10", name: "10 Můj kraj v historii", month: "Červen", icon: "map", desc: "Finále: Rekonstrukce místní dominanty regionu.", file: "metodika_4_10.pdf" }
            ];

            const lessons5 = [
                { id: "PL01", name: "01 Husitské ležení", month: "Září", icon: "shield-check", desc: "Vozová hradba, bojové vozy a strategie.", file: "Projektový list 01 září husté 5 třída.pdf" },
                { id: "PL02", name: "02 Barokní areál", month: "Říjen", icon: "layout-grid", desc: "Symetrie zámku, zahrada a morový sloup.", file: "projektovy list 02 říjen baroko 5 třída.pdf" },
                { id: "PL03", name: "03 Škola základ života", month: "Listopad", icon: "book-open", desc: "Reformy Marie Terezie a historická třída.", file: "Projekotvý list 03 listopad marie terezie 5 třída.pdf" },
                { id: "PL04", name: "04 Věk páry a komínů", month: "Prosinec", icon: "factory", desc: "Průmyslová revoluce a Baťovy domky.", file: "PL 04 prosinec průmyslová revoluce 5 třída.pdf" },
                { id: "PL05", name: "05 Národní obrození", month: "Leden", icon: "theater", desc: "Divadlo 'Národ sobě', scéna a nábřeží.", file: "PL 05 Národní obrození 5 třída.pdf" },
                { id: "PL06", name: "06 První republika", month: "Únor", icon: "building", desc: "Funkcionalismus, bílé vily a Masaryk.", file: "PL 06 1 republika 5 třída.pdf" },
                { id: "PL07", name: "07 Betonová hranice", month: "Březen", icon: "construction", desc: "Opevnění 1938, stavba řopíků a zátarasy.", file: "PL 07 březen 2SV 5 třída.pdf" },
                { id: "PL08", name: "08 Sídliště a modularita", month: "Duben", icon: "box", desc: "Život v socialismu a panelové domy.", file: "PL 08 duben železná opona 5 třída.pdf" },
                { id: "PL09", name: "09 Sametová revoluce", month: "Květen", icon: "flag", desc: "Návrat ke svobodě, Václav Havel a pád zdi.", file: "PL 09 květen sametová revoluce 5 třída.pdf" },
                { id: "PL10", name: "10 Moderní Česko", month: "Červen", icon: "sprout", desc: "Smart region a vize pro budoucnost.", file: "PL 10 červen čr v evropě moderní stát 5 třída.pdf" }
            ];

            const adminDocs = [
                { name: "Smlouva o dílo (Vzor)", file: "smlouva_vzor.docx", icon: "scale" },
                { name: "Technická specifikace NM-650", file: "specifikace_nm650.pdf", icon: "file-digit" }
            ];

            if (view === 'portal') {
                return (
                    <div className="min-h-screen bg-slate-50 text-left">
                        <nav className="bg-slate-950 text-white p-6 sticky top-0 z-50 border-b-4 border-red-600 flex justify-between items-center shadow-xl">
                            <button onClick={() => setView('home')} className="flex items-center gap-2 font-black uppercase text-[10px] tracking-widest hover:text-red-500 transition-colors">
                                <Icon name="arrow-left" size={14}/> Zpět na web
                            </button>
                            <div className="flex items-center gap-3 font-black uppercase italic text-lg tracking-widest">
                                <Icon name="lock" size={18} className="text-red-500"/> Portál pro školy
                            </div>
                            <div className="bg-red-600 px-4 py-1 rounded font-black text-[10px] uppercase shadow-lg tracking-widest">Školní zóna</div>
                        </nav>

                        <div className="max-w-7xl mx-auto p-8 md:p-12">
                            {/* ADMINISTRATIVA */}
                            <section className="mb-16">
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.4em] mb-6 flex items-center gap-3">
                                    <Icon name="scale" size={16}/> Administrativa pro školy
                                </h2>
                                <div className="grid md:grid-cols-2 gap-6">
                                    {adminDocs.map((doc, i) => (
                                        <div key={i} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex items-center justify-between group hover:border-red-600 transition-all cursor-pointer">
                                            <div className="flex items-center gap-4">
                                                <div className="bg-slate-100 p-3 rounded-2xl text-slate-400 group-hover:text-red-600 transition-colors">
                                                    <Icon name={doc.icon} size={24}/>
                                                </div>
                                                <p className="font-black uppercase text-xs text-slate-900">{doc.name}</p>
                                            </div>
                                            <a href={doc.file} download className="text-slate-300 hover:text-red-600 transition-colors">
                                                <Icon name="download" size={20}/>
                                            </a>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            {/* 4. TŘÍDA */}
                            <section className="mb-16">
                                <div className="flex items-center gap-4 mb-10">
                                    <div className="bg-blue-600 text-white p-3 rounded-2xl shadow-xl shadow-blue-900/20"><Icon name="map" size={24}/></div>
                                    <h2 className="text-3xl font-black uppercase italic tracking-tight">4. Ročník (Kořeny)</h2>
                                </div>
                                <div className="grid md:grid-cols-2 lg:grid-cols-5 gap-4">
                                    {lessons4.map(l => (
                                        <div key={l.id} className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col justify-between min-h-[220px] hover:shadow-xl transition-all border-l-4 border-l-blue-600">
                                            <div>
                                                <div className="flex justify-between items-start mb-4">
                                                    <Icon name={l.icon} className="text-blue-600" size={24}/>
                                                    <span className="text-[9px] font-black uppercase tracking-widest bg-blue-50 px-2 py-1 rounded text-blue-500">{l.month}</span>
                                                </div>
                                                <h3 className="text-xs font-black uppercase text-slate-950 mb-2 leading-tight">{l.name}</h3>
                                                <p className="text-[9px] text-slate-400 font-bold uppercase italic leading-tight">{l.desc}</p>
                                            </div>
                                            <a href={l.file} download className="mt-4 w-full bg-slate-50 text-blue-600 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest text-center hover:bg-blue-600 hover:text-white transition-all">Stáhnout PDF</a>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            {/* 5. TŘÍDA */}
                            <section>
                                <div className="flex items-center gap-4 mb-10">
                                    <div className="bg-red-600 text-white p-3 rounded-2xl shadow-xl shadow-red-900/20"><Icon name="history" size={24}/></div>
                                    <h2 className="text-3xl font-black uppercase italic tracking-tight">5. Ročník (Moderní stát)</h2>
                                </div>
                                <div className="grid md:grid-cols-2 lg:grid-cols-5 gap-4">
                                    {lessons5.map(l => (
                                        <div key={l.id} className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col justify-between min-h-[220px] hover:shadow-xl transition-all border-l-4 border-l-red-600">
                                            <div>
                                                <div className="flex justify-between items-start mb-4">
                                                    <Icon name={l.icon} className="text-red-600" size={24}/>
                                                    <span className="text-[9px] font-black uppercase tracking-widest bg-red-50 px-2 py-1 rounded text-red-600">{l.month}</span>
                                                </div>
                                                <h3 className="text-xs font-black uppercase text-slate-950 mb-2 leading-tight">{l.name}</h3>
                                                <p className="text-[9px] text-slate-400 font-bold uppercase italic leading-tight">{l.desc}</p>
                                            </div>
                                            <a href={l.file} download className="mt-4 w-full bg-slate-900 text-white py-2 rounded-xl text-[9px] font-black uppercase tracking-widest text-center hover:bg-red-600 transition-all">Stáhnout PDF</a>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-white text-left">
                    {/* NAV */}
                    <nav className="fixed top-0 w-full bg-white/95 backdrop-blur-lg z-[100] border-b border-slate-100 px-6 h-20 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="bg-red-600 p-1.5 rounded-xl text-white shadow-lg"><Icon name="box" size={24}/></div>
                            <span className="text-xl font-black uppercase tracking-tighter italic text-slate-950">Škola<span className="text-red-600">hrou</span></span>
                        </div>
                        <button onClick={() => setView('portal')} className="flex items-center gap-3 bg-slate-950 text-white px-8 py-3 rounded-full hover:bg-red-600 transition-all shadow-xl active:scale-95 text-[10px] font-black uppercase tracking-widest">
                            <Icon name="lock" size={16} className="text-red-500" /> Portál pro školy
                        </button>
                    </nav>

                    {/* HERO */}
                    <header className="pt-48 pb-32 px-6 bg-slate-50 relative overflow-hidden">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-20 items-center">
                            <div className="text-left animate-in fade-in slide-in-from-left-8 duration-700">
                                <span className="bg-red-100 text-red-600 px-5 py-2 rounded-full text-[11px] font-black uppercase tracking-[0.3em] mb-8 inline-block shadow-sm">Projekt Škola hrou</span>
                                <h1 className="text-7xl md:text-9xl font-black tracking-tighter leading-[0.8] mb-10 uppercase italic text-slate-950">
                                    Stavíme<br/><span className="text-red-600">Příběhy</span>
                                </h1>
                                <p className="text-2xl text-slate-500 font-medium leading-relaxed mb-12 max-w-xl italic">
                                    Edu-Box NM-650: Inovativní 3D platforma pro výuku vlastivědy a polytechniky. Žáci dějiny nečtou, ale fyzicky konstruují.
                                </p>
                                <div className="flex flex-wrap gap-6">
                                    <button onClick={() => setView('portal')} className="bg-red-600 text-white px-12 py-6 rounded-3xl font-black uppercase text-sm tracking-widest shadow-2xl hover:bg-red-700 transition-all flex items-center gap-4 active:scale-95">
                                        <Icon name="book-open" size={24}/> Otevřít Metodiku
                                    </button>
                                    <div className="bg-white p-6 rounded-3xl border-2 border-slate-200 flex items-center gap-6 shadow-sm">
                                        <div className="text-left leading-none">
                                            <p className="text-[10px] font-black text-slate-400 mb-1">Cena sady</p>
                                            <p className="text-3xl font-black text-slate-950">49 500,-</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="relative">
                                <div className="bg-white p-4 rounded-[4rem] shadow-[0_50px_100px_rgba(0,0,0,0.15)] border-2 border-slate-100 overflow-hidden aspect-square flex items-center justify-center bg-slate-100">
                                    <Icon name="camera" size={64} className="opacity-10 text-slate-400"/>
                                </div>
                                <div className="absolute -bottom-8 -right-8 bg-slate-900 text-white p-10 rounded-[3rem] shadow-2xl border-b-[12px] border-red-600 text-left">
                                    <div className="flex items-center gap-4 mb-2">
                                        <Icon name="zap" size={32} className="text-red-600"/>
                                        <p className="text-6xl font-black leading-none italic">20+</p>
                                    </div>
                                    <p className="text-xs font-black uppercase tracking-[0.3em] opacity-60 leading-tight italic">Lekcí pro ZŠ</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* FILOZOFIE */}
                    <section className="py-32 px-6 bg-white border-t">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-3 gap-12">
                            <div>
                                <div className="bg-red-600 p-4 rounded-2xl inline-block mb-6 text-white shadow-xl"><Icon name="bar-chart-3" size={32}/></div>
                                <h4 className="text-xl font-black uppercase mb-4">75% Míra zapamatování</h4>
                                <p className="text-slate-500 font-medium italic leading-relaxed">Vlastní fyzická konstrukce vede k hlubokému ukotvení znalostí. Žák model informaci prožije.</p>
                            </div>
                            <div>
                                <div className="bg-slate-900 p-4 rounded-2xl inline-block mb-6 text-white shadow-xl"><Icon name="shield-check" size={32}/></div>
                                <h4 className="text-xl font-black uppercase mb-4">Inovace dle RVP</h4>
                                <p className="text-slate-500 font-medium italic leading-relaxed">Plná kompatibilita se Šablonami OP JAK. Naplňuje polytechniku i novou informatiku.</p>
                            </div>
                            <div>
                                <div className="bg-blue-600 p-4 rounded-2xl inline-block mb-6 text-white shadow-xl"><Icon name="layers" size={32}/></div>
                                <h4 className="text-xl font-black uppercase mb-4">Inženýrská Logika</h4>
                                <p className="text-slate-500 font-medium italic leading-relaxed">Učíme techniku SNOT (Skelet vs Fasáda). Rozvoj prostorové představivosti a statiky.</p>
                            </div>
                        </div>
                    </section>

                    <footer className="bg-slate-950 text-white py-20 px-6 border-t border-red-600">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start gap-16 opacity-60">
                            <div className="text-left leading-none">
                                <div className="flex items-center gap-3 mb-6">
                                    <Icon name="box" size={32} className="text-red-600"/>
                                    <span className="text-3xl font-black uppercase tracking-tighter italic text-white text-left">Škola hrou</span>
                                </div>
                                <p className="text-xs font-bold uppercase tracking-[0.4em]">Inženýrská metoda Martin Vohralík // 2026</p>
                            </div>
                            <div className="text-right flex flex-col items-end">
                                <p className="text-[10px] font-black uppercase tracking-widest mb-4 italic">Kontakt a podpora</p>
                                <p className="text-sm font-black underline decoration-red-600 decoration-8 underline-offset-8">info@edu-box.cz</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
